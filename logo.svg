<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Central diamond / command center shape -->
  <g transform="translate(256, 240)">
    <!-- Outer ring - the team -->
    <circle cx="0" cy="0" r="140" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.15"/>

    <!-- Agent nodes on the outer ring -->
    <!-- Top: Architect -->
    <circle cx="0" cy="-140" r="14" fill="#3B82F6" opacity="0.9"/>
    <!-- Top-right: Designer -->
    <circle cx="99" cy="-99" r="14" fill="#8B5CF6" opacity="0.9"/>
    <!-- Right: Developer -->
    <circle cx="140" cy="0" r="14" fill="#10B981" opacity="0.9"/>
    <!-- Bottom-right: Tester -->
    <circle cx="99" cy="99" r="14" fill="#F59E0B" opacity="0.9"/>
    <!-- Bottom: Reviewer -->
    <circle cx="0" cy="140" r="14" fill="#EF4444" opacity="0.9"/>
    <!-- Bottom-left: DevOps -->
    <circle cx="-99" cy="99" r="14" fill="#06B6D4" opacity="0.9"/>
    <!-- Left: Researcher -->
    <circle cx="-140" cy="0" r="14" fill="#EC4899" opacity="0.9"/>
    <!-- Top-left: UX Engineer -->
    <circle cx="-99" cy="-99" r="14" fill="#F97316" opacity="0.9"/>

    <!-- Connection lines from center to nodes -->
    <g stroke="url(#glow)" stroke-width="1.5" opacity="0.25">
      <line x1="0" y1="0" x2="0" y2="-140"/>
      <line x1="0" y1="0" x2="99" y2="-99"/>
      <line x1="0" y1="0" x2="140" y2="0"/>
      <line x1="0" y1="0" x2="99" y2="99"/>
      <line x1="0" y1="0" x2="0" y2="140"/>
      <line x1="0" y1="0" x2="-99" y2="99"/>
      <line x1="0" y1="0" x2="-140" y2="0"/>
      <line x1="0" y1="0" x2="-99" y2="-99"/>
    </g>

    <!-- CEO center node -->
    <circle cx="0" cy="0" r="36" fill="url(#accent)" opacity="0.15"/>
    <circle cx="0" cy="0" r="28" fill="url(#accent)" opacity="0.9"/>

    <!-- CEO star/crown symbol -->
    <polygon points="0,-14 4,-5 14,-5 6,1 9,11 0,5 -9,11 -6,1 -14,-5 -4,-5" fill="#fff" opacity="0.95"/>
  </g>

  <!-- Text: SWE -->
  <text x="256" y="435" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" letter-spacing="12" fill="url(#glow)">SWE</text>

  <!-- Subtitle -->
  <text x="256" y="468" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" letter-spacing="4" fill="#64748B">PLUGIN</text>
</svg>
